    <main>
      <section class="favorites-section">
        <div class="container favorites-section__container">
          <h1 class="favorites-section__title">Favorites</h1>

          <div class="favorites-section__body">

            
            <aside class="fav-sidebar">
              
              <div class="quote-card" id="quote-card">
                <div class="quote-card__header">
                  <div class="quote-card__icon-wrap">
                    <svg width="20" height="20" aria-hidden="true"><use href="/hw_js_ns/assets/icons-CN5o3180.svg#icon-runner"></use></svg>
                  </div>
                  <span class="quote-card__label">Quote of the day</span>
                  <svg class="quote-card__marks" width="24" height="18" aria-hidden="true"><use href="/hw_js_ns/assets/icons-CN5o3180.svg#icon-quotes"></use></svg>
                </div>
                <p class="quote-card__text" id="quote-text">Loading...</p>
                <p class="quote-card__author" id="quote-author"></p>
              </div>

              
              <div class="fav-info-row">
                <div class="norm-card fav-norm">
                  <div class="norm-card__top">
                    <svg class="norm-card__icon" width="32" height="32" aria-hidden="true"><use href="/hw_js_ns/assets/icons-CN5o3180.svg#icon-dumbbell"></use></svg>
                    <div>
                      <p class="norm-card__value">110 min</p>
                      <p class="norm-card__label">Daily norm of sports</p>
                    </div>
                  </div>
                </div>
                <div class="sidebar-photo fav-photo">
                  <picture>
                    <source
                      type="image/webp"
                      srcset="/hw_js_ns/assets/sidebar-photo-DiVUG1Lw.webp 1x, /hw_js_ns/assets/sidebar-photo@2x-CpEBTGrG.webp 2x"
                    />
                    <img
                      src="/hw_js_ns/assets/sidebar-photo-CaKQ929N.jpg"
                      srcset="/hw_js_ns/assets/sidebar-photo-CaKQ929N.jpg 1x, /hw_js_ns/assets/sidebar-photo@2x-DiWz8GpT.jpg 2x"
                      onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1518611012118-696072aa579a?w=888&h=484&fit=crop&auto=format'"
                      alt="People working out"
                      class="sidebar-photo__img"
                      width="444" height="242"
                      loading="lazy"
                      decoding="async"
                    />
                  </picture>
                </div>
              </div>
            </aside>

            
            <div class="favorites-content" id="favorites-content">
              
            </div>
          </div>
        </div>
      </section>
    </main>

    
    <div class="modal-overlay hidden" id="modal-exercise" role="dialog" aria-modal="true" aria-labelledby="modal-exercise-title">
      <div class="modal modal--exercise">
        <button class="modal__close" type="button" aria-label="Close modal">
          <svg width="16" height="16" aria-hidden="true"><use href="/hw_js_ns/assets/icons-CN5o3180.svg#icon-close"></use></svg>
        </button>
        <div class="modal-exercise__body" id="modal-exercise-body"></div>
      </div>
    </div>

    
    <div class="modal-overlay hidden" id="modal-rating" role="dialog" aria-modal="true" aria-labelledby="modal-rating-title">
      <div class="modal modal--rating">
        <button class="modal__close" type="button" aria-label="Close modal">
          <svg width="16" height="16" aria-hidden="true"><use href="/hw_js_ns/assets/icons-CN5o3180.svg#icon-close"></use></svg>
        </button>
        <div class="modal-rating__body">
          <p class="modal-rating__label">Rating</p>
          <div class="rating-stars" id="rating-stars" role="group" aria-label="Rating">
            <span class="rating-stars__value" id="rating-value">0.0</span>
          </div>
          <form class="rating-form" id="rating-form" novalidate>
            <input class="rating-form__input" id="rating-email" type="email" placeholder="Email" aria-label="Email" required />
            <textarea class="rating-form__textarea" id="rating-comment" placeholder="Your comment" aria-label="Comment"></textarea>
            <button class="rating-form__submit" type="submit">Send</button>
          </form>
        </div>
      </div>
    </div>
